name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get install -y shellcheck
          else
            brew install shellcheck
          fi
      - name: Lint statusline-command.sh
        run: shellcheck -s sh statusline-command.sh

  symlink-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify skill asset is a symlink to root script
        run: |
          if [ ! -L skill/assets/statusline-command.sh ]; then
            echo "skill/assets/statusline-command.sh must be a symlink"
            exit 1
          fi
          target=$(readlink skill/assets/statusline-command.sh)
          if [ "$target" != "../../statusline-command.sh" ]; then
            echo "Symlink target is '$target', expected '../../statusline-command.sh'"
            exit 1
          fi
          echo "Symlink is correct"

  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install jq
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get install -y jq
          else
            brew install jq
          fi
      - name: Run tests
        run: sh tests/run_tests.sh
